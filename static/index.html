<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bibliothèque d'activités nature</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f0; --surface: #ffffff; --surface2: #f0efe8;
      --border: #d8d6cc; --text: #2a2a25; --text-muted: #7a7a72;
      --accent: #4a7c59; --accent-light: #d4e8db; --accent-dark: #2e5238;
      --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --excl: #c0392b; --excl-light: #fdecea;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--accent-dark); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .stat { font-size: .8rem; opacity: .7; margin-left: auto; }
    .app { display: flex; flex: 1; min-height: 0; }

    /* SIDEBAR */
    .sidebar { width: 290px; min-width: 250px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 18px; }
    .sidebar-section { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); }
    select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .85rem; background: var(--surface); color: var(--text); }
    select:focus { outline: none; border-color: var(--accent); }
    .check-group { display: flex; flex-direction: column; gap: 4px; }
    .check-item { display: flex; align-items: flex-start; gap: 6px; font-size: .83rem; cursor: pointer; padding: 2px 0; line-height: 1.35; }
    .check-item input { accent-color: var(--accent); margin-top: 3px; flex-shrink: 0; }
    .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
    .month-btn { padding: 4px 2px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); font-size: .75rem; cursor: pointer; text-align: center; }
    .month-btn.active-incl { background: var(--accent); color: white; border-color: var(--accent); }
    .month-btn.active-excl { background: var(--excl); color: white; border-color: var(--excl); }

    /* ARBRE */
    .tree-wrap { border: 1px solid var(--border); border-radius: var(--radius); max-height: 280px; overflow-y: auto; padding: 5px; }
    .tree-actions { display: flex; gap: 8px; margin-bottom: 4px; }
    .tree-btn { font-size: .72rem; color: var(--accent); background: none; border: none; cursor: pointer; }
    .tree-btn:hover { text-decoration: underline; }

    /* ATTENDUS */
    .attendus-domaine-header { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 3px 4px; border-radius: 4px; user-select: none; }
    .attendus-domaine-header:hover { background: var(--surface2); }
    .attendus-domaine-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); flex: 1; }
    .attendus-domaine-chev { font-size: .55rem; color: var(--text-muted); transition: transform .15s; flex-shrink: 0; }
    .attendus-domaine-body { display: none; padding-left: 4px; }
    .attendus-domaine-body.open { display: block; }

    /* BOUTONS */
    .btn { padding: 7px 14px; border: none; border-radius: var(--radius); font-size: .85rem; cursor: pointer; font-weight: 500; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--surface2); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; max-width: 380px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .85rem; }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-mode-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .82rem; background: var(--surface); color: var(--text); width: auto; }
    .search-mode-select:focus { outline: none; border-color: var(--accent); }
    .result-count { font-size: .82rem; color: var(--text-muted); }
    .cycle-counts { font-size: .78rem; color: var(--text-muted); white-space: nowrap; }
    .sort-select { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .82rem; background: var(--surface); color: var(--text); width: auto; }

    /* CHIPS */
    .chips-bar { padding: 6px 20px 8px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .chips-bar:empty { display: none; }
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: .75rem; font-weight: 600; cursor: default; border: 1px solid transparent; }
    .chip.incl { background: var(--accent-light); color: var(--accent-dark); border-color: var(--accent); }
    .chip.excl { background: var(--excl-light); color: var(--excl); border-color: var(--excl); }
    .chip-toggle { background: none; border: none; cursor: pointer; font-size: .8rem; padding: 0 1px; line-height: 1; }
    .chip-toggle:hover { opacity: .7; }
    .chip-remove { background: none; border: none; cursor: pointer; font-size: .85rem; padding: 0; line-height: 1; opacity: .6; }
    .chip-remove:hover { opacity: 1; }

    .results { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 9px; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
    .card:hover { box-shadow: var(--shadow); border-color: var(--accent); }
    .card-title { font-size: .95rem; font-weight: 600; margin-bottom: 5px; }
    .card-meta { font-size: .78rem; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 5px; }
    .card-desc { font-size: .81rem; color: var(--text-muted); line-height: 1.45; }
    .badge { font-size: .7rem; padding: 2px 7px; border-radius: 20px; background: #e8f0e9; color: #2e5238; font-weight: 500; }
    .badge.attendu-dom { background: #f0ebe0; color: #5c3e10; font-size: .68rem; white-space: nowrap; }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 0; }
    .page-info { font-size: .82rem; color: var(--text-muted); }

    /* DRAWER */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; }
    .overlay.open { display: block; }
    .drawer { position: fixed; right: -600px; top: 0; bottom: 0; width: 560px; max-width: 95vw; background: var(--surface); box-shadow: -4px 0 24px rgba(0,0,0,.12); z-index: 101; overflow-y: auto; transition: right .2s; padding: 24px; display: flex; flex-direction: column; gap: 15px; }
    .drawer.open { right: 0; }
    .drawer-close { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }
    .drawer h2 { font-size: 1.1rem; font-weight: 700; padding-right: 36px; line-height: 1.4; }
    .drawer-section { display: flex; flex-direction: column; gap: 7px; }
    .drawer-section h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .info-item { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
    .info-item .key { font-size: .7rem; color: var(--text-muted); margin-bottom: 2px; }
    .info-item .val { font-size: .87rem; font-weight: 500; }
    .badges-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .open-folder-btn { display: inline-flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--accent); border: 1px solid var(--accent); background: none; padding: 6px 12px; border-radius: var(--radius); cursor: pointer; }
    .open-folder-btn:hover { background: var(--accent-light); }
    .attendu-row { font-size: .8rem; padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 7px; align-items: baseline; line-height: 1.4; }
    .edit-field { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .85rem; background: var(--surface); color: var(--text); font-family: inherit; }
    .edit-field:focus { outline: none; border-color: var(--accent); }
    textarea.edit-field { resize: vertical; min-height: 80px; line-height: 1.5; }
    .edit-row { display: flex; gap: 8px; align-items: center; }
    .edit-check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .edit-section-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; margin-bottom: 4px; }
    .btn-edit { display: inline-flex; align-items: center; gap: 5px; font-size: .82rem; color: var(--accent); border: 1px solid var(--accent); background: none; padding: 5px 11px; border-radius: var(--radius); cursor: pointer; }
    .btn-edit:hover { background: var(--accent-light); }
    .btn-save { background: var(--accent); color: white; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: .85rem; cursor: pointer; font-weight: 600; }
    .btn-save:hover { background: var(--accent-dark); }
    .btn-cancel { background: none; border: 1px solid var(--border); padding: 7px 14px; border-radius: var(--radius); font-size: .85rem; cursor: pointer; }
    .edit-tree-wrap { border: 1px solid var(--border); border-radius: var(--radius); max-height: 220px; overflow-y: auto; padding: 5px; }
    .save-success { font-size: .82rem; color: var(--accent); padding: 4px 0; }
    .save-error { font-size: .82rem; color: #c0392b; padding: 4px 0; }
    .attendu-row:last-child { border-bottom: none; }
    .attendu-cycle-title { font-size: .72rem; font-weight: 700; color: var(--accent-dark); margin: 8px 0 3px; }
    .filter-pick-btn { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); font-size:.85rem; cursor:pointer; display:flex; align-items:center; text-align:left; gap:4px; }
    .filter-pick-btn:hover { border-color:var(--accent); }
    .filter-pick-btn.active-incl { border-color:var(--accent); background:var(--accent-light); color:var(--accent-dark); font-weight:600; }
    .filter-pick-btn.active-excl { border-color:var(--excl); background:var(--excl-light); color:var(--excl); font-weight:600; }
    /* Bouton bascule +/- sur le filtre */
    .toggle-mode-btn { flex-shrink:0; width:20px; height:20px; border-radius:50%; border:none; cursor:pointer; font-size:.8rem; font-weight:700; display:inline-flex; align-items:center; justify-content:center; line-height:1; }
    .toggle-mode-btn.incl { background:var(--accent); color:white; }
    .toggle-mode-btn.excl { background:var(--excl); color:white; }

    /* MODALE ARBRE */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:12px; width:560px; max-width:94vw; max-height:85vh; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,.18); overflow:hidden; }
    .modal-header { padding:16px 20px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .modal-header h3 { font-size:1rem; font-weight:700; flex:1; }
    .modal-search { padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:.84rem; width:100%; margin-bottom:0; }
    .modal-search:focus { outline:none; border-color:var(--accent); }
    .modal-close { background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--text-muted); padding:0 4px; }
    .modal-actions { display:flex; gap:8px; padding:8px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
    .modal-tree { flex:1; overflow-y:auto; padding:10px 16px; }
    .modal-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
    .modal-excl-toggle { margin-left:auto; display:flex; align-items:center; gap:6px; font-size:.78rem; }
    .modal-excl-toggle input { accent-color:var(--excl); }

    /* Noeuds arbre modale */
    .mnode { }
    .mrow { display:flex; align-items:center; padding:4px 6px; border-radius:6px; cursor:pointer; gap:6px; }
    .mrow:hover { background:var(--accent-light); }
    .mrow.selected-incl { background:var(--accent); color:white; }
    .mrow.selected-excl { background:var(--excl-light); color:var(--excl); border:1px solid var(--excl); }
    .mrow.selected-incl .mchev, .mrow.selected-excl .mchev { }
    .mchev { font-size:.6rem; width:14px; text-align:center; color:var(--text-muted); flex-shrink:0; transition:transform .15s; }
    .mnode.open > .mrow .mchev { transform:rotate(90deg); }
    .mlabel { font-size:.85rem; line-height:1.35; flex:1; }
    .mchildren { display:none; padding-left:16px; }
    .mnode.open > .mchildren { display:block; }

    .empty { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: .9rem; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">🌿</span>
  <h1>Bibliothèque d'activités nature</h1>
  <span class="stat" id="header-stat"></span>
</header>

<div class="app">
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Lieu</div>
      <select id="f-lieu">
        <option value="">Tous</option>
        <option value="Intérieur">Intérieur</option>
        <option value="Extérieur">Extérieur</option>
        <option value="Intérieur/Extérieur">Intérieur / Extérieur</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Météo</div>
      <div class="check-group">
        <label class="check-item"><input type="checkbox" name="meteo" value="nuage"> ☁️ Nuageux</label>
        <label class="check-item"><input type="checkbox" name="meteo" value="soleil"> ☀️ Soleil</label>
        <label class="check-item"><input type="checkbox" name="meteo" value="pluie"> 🌧️ Pluie</label>
        <label class="check-item"><input type="checkbox" name="meteo" value="vent"> 💨 Vent</label>
        <label class="check-item"><input type="checkbox" name="meteo" value="nuit"> 🌙 Nuit</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Mois</div>
      <div class="month-grid">
        <button class="month-btn" data-m="jan">Jan</button>
        <button class="month-btn" data-m="fev">Fév</button>
        <button class="month-btn" data-m="mar">Mar</button>
        <button class="month-btn" data-m="avr">Avr</button>
        <button class="month-btn" data-m="mai">Mai</button>
        <button class="month-btn" data-m="jun">Jun</button>
        <button class="month-btn" data-m="jul">Jul</button>
        <button class="month-btn" data-m="aou">Aoû</button>
        <button class="month-btn" data-m="sep">Sep</button>
        <button class="month-btn" data-m="oct">Oct</button>
        <button class="month-btn" data-m="nov">Nov</button>
        <button class="month-btn" data-m="dec">Déc</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Format groupe</div>
      <select id="f-groupe">
        <option value="">Tous</option>
        <option value="individuel">Individuel</option>
        <option value="binôme">Binôme</option>
        <option value="petit groupe">Petit groupe</option>
        <option value="grand groupe">Grand groupe</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Déjà animé</div>
      <div class="check-group">
        <label class="check-item"><input type="radio" name="anime" value=""> Toutes</label>
        <label class="check-item"><input type="radio" name="anime" value="1"> Déjà animées</label>
        <label class="check-item"><input type="radio" name="anime" value="0"> Pas encore animées</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Thématique</div>
      <button class="filter-pick-btn" id="btn-pick-them" onclick="openTreeModal('them')">
        <span id="pick-them-label">Toutes</span>
        <span style="margin-left:auto;opacity:.5">▼</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Objectif</div>
      <button class="filter-pick-btn" id="btn-pick-obj" onclick="openTreeModal('obj')">
        <span id="pick-obj-label">Tous</span>
        <span style="margin-left:auto;opacity:.5">▼</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Cycle</div>
      <div class="check-group" id="f-cycles"></div>
    </div>

    <div class="sidebar-section" id="section-attendus-edd" style="display:none">
      <div class="sidebar-label">Attendus EDD</div>
      <div id="f-attendus-edd"></div>
    </div>
    <div class="sidebar-section" id="section-attendus-disc" style="display:none">
      <div class="sidebar-label">Attendus disciplinaires</div>
      <div id="f-attendus-disc"></div>
    </div>

    <div class="sidebar-section" id="section-tags" style="display:none">
      <div class="sidebar-label">Tags</div>
      <div class="check-group" id="f-tags"></div>
    </div>

    <button class="btn btn-ghost" id="btn-reset">✕ Réinitialiser</button>
  </aside>

  <main class="main">
    <div class="toolbar">
      <input type="text" id="search-input" class="search-input" placeholder="Rechercher une activité…" />
      <select id="search-mode" class="search-mode-select" title="Champ de recherche">
        <option value="titre">Titre uniquement</option>
        <option value="titre_desc">Titre + description</option>
        <option value="objectif">Visée pédagogique</option>
      </select>
      <button class="btn btn-primary" id="btn-search">Rechercher</button>
      <button class="btn btn-ghost" id="btn-reset-toolbar" title="Réinitialiser les filtres">✕</button>
      <select id="sort-select" class="sort-select" title="Tri">
        <option value="nom">Alphabétique</option>
        <option value="nb_attendus">Plus d'attendus</option>
        <option value="nb_thematiques">Plus de thématiques</option>
      </select>
      <span class="result-count" id="result-count"></span>
      <span class="cycle-counts" id="cycle-counts"></span>
    </div>
    <!-- Barre de chips filtres actifs -->
    <div class="chips-bar" id="chips-bar"></div>
    <div class="results" id="results"><div class="loading">Chargement…</div></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="drawer-close">✕</button>
  <div id="drawer-content"></div>
</div>

<!-- Modale arbre thématique/objectif -->
<div class="modal-overlay" id="tree-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Choisir une thématique</h3>
      <input type="text" class="modal-search" id="modal-search" placeholder="Rechercher…" oninput="filterModal(this.value)">
      <button class="modal-close" onclick="closeTreeModal()">✕</button>
    </div>
    <div class="modal-actions">
      <button class="tree-btn" onclick="expandAllModal()">Tout déplier</button>
      <button class="tree-btn" onclick="collapseAllModal()">Tout replier</button>
      <button class="tree-btn" onclick="clearModalSelection()" style="color:#c0392b">Effacer</button>
      <label class="modal-excl-toggle">
        <input type="checkbox" id="modal-excl-check"> Mode exclusion
      </label>
    </div>
    <div class="modal-tree" id="modal-tree"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTreeModal()">Fermer</button>
    </div>
  </div>
</div>

<script>
// ============================================================================
// ÉTAT GLOBAL
// ============================================================================
const S = {
  q:'', lieu:'', meteo:[], mois:null, moisMode:'incl', groupe:'',
  thematique_id:null, thematique_mode:'incl', thematique_nom:null,
  objectif_id:null, objectif_mode:'incl', objectif_nom:null,
  cycle_ids:[], attendu_ids:[], tag_ids:[],
  search_mode:'titre', anime:'', sort:'nom',
  limit:40, offset:0, total:0
};
// Modes d'exclusion par type de filtre (pour les checkboxes)
const METEO_MODES   = {}; // valeur => 'incl'|'excl'
const ATTENDU_MODES = {}; // id => 'incl'|'excl'
const TAG_MODES     = {}; // id => 'incl'|'excl'
const CYCLE_MODES   = {}; // id => 'incl'|'excl'

const MOIS_NOMS  = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
const MOIS_LAB   = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MOIS_COURT = ['J','F','M','A','M','J','J','A','S','O','N','D'];
const METEO_ICO  = {nuage:'☁️', soleil:'☀️', pluie:'🌧️', vent:'💨', nuit:'🌙'};
const METEO_LAB  = {nuage:'Nuageux', soleil:'Soleil', pluie:'Pluie', vent:'Vent', nuit:'Nuit'};

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ============================================================================
// INIT
// ============================================================================
async function init() {
  try {
    const s = await api('/api/stats');
    document.getElementById('header-stat').textContent =
      `${s.total_activites} activités · ${s.total_thematiques} thématiques`;
  } catch(e){}

  // Cycles
  try {
    const cycles = await api('/api/cycles');
    const c = document.getElementById('f-cycles');
    cycles.forEach(cy => {
      const wrap = document.createElement('div');
      wrap.style = 'display:flex;align-items:flex-start;gap:4px;padding:2px 0';
      const lbl = document.createElement('label');
      lbl.className = 'check-item';
      lbl.style.flex = '1';
      lbl.innerHTML = `<input type="checkbox" name="cycle" value="${cy.id}">
        <span><strong>${cy.code}</strong> — ${cy.nom}
        <span style="color:var(--text-muted);font-size:.73rem"> (${cy.ages})</span></span>`;
      wrap.appendChild(lbl);
      c.appendChild(wrap);
      CYCLE_MODES[cy.id] = 'incl';
    });
  } catch(e){}

  // Tags
  try {
    const tags = await api('/api/tags');
    const sec = document.getElementById('section-tags');
    const c = document.getElementById('f-tags');
    if (tags.length) {
      tags.forEach(t => {
        const lbl = document.createElement('label');
        lbl.className = 'check-item';
        lbl.innerHTML = `<input type="checkbox" name="tag" value="${t.id}"> ${t.nom}`;
        c.appendChild(lbl);
        TAG_MODES[t.id] = 'incl';
      });
      sec.style.display = 'block';
    }
  } catch(e){}

  // Cache arbres
  try { treeCache.them = await api('/api/thematiques/arbre'); } catch(e){}
  try { treeCache.obj  = await api('/api/objectifs/arbre');   } catch(e){}

  bindEvents();

  // Lecture des paramètres URL (lien depuis dashboard)
  applyURLParams();

  search();
}

// ============================================================================
// LECTURE PARAMS URL
// ============================================================================
function applyURLParams() {
  const params = new URLSearchParams(window.location.search);
  const attenduIds = params.get('attendu_ids');
  if (attenduIds) {
    const ids = attenduIds.split(',').map(x => x.trim()).filter(Boolean);
    if (ids.length) {
      S.attendu_ids = ids;
      // On pré-coche les cycles nécessaires pour afficher la section
      // Les checkboxes d'attendus seront créées après chargement async
      // On déclenche une recherche filtrée directement via S.attendu_ids
    }
  }
}

// ============================================================================
// ATTENDUS
// ============================================================================
function buildAttendusAccordion(items, container, multiCycle) {
  container.innerHTML = '';
  const byDomaine = {};
  items.forEach(function(a) {
    var key = (multiCycle ? '[' + (a.cycle_code||'') + '] ' : '') + a.domaine;
    if (!byDomaine[key]) byDomaine[key] = [];
    byDomaine[key].push(a);
  });
  Object.keys(byDomaine).forEach(function(dom) {
    var attendus = byDomaine[dom];
    var header = document.createElement('div');
    header.className = 'attendus-domaine-header';
    var chev = document.createElement('span');
    chev.className = 'attendus-domaine-chev';
    chev.textContent = '▶';
    var label = document.createElement('span');
    label.className = 'attendus-domaine-label';
    label.textContent = dom;
    header.appendChild(chev);
    header.appendChild(label);
    container.appendChild(header);
    var body = document.createElement('div');
    body.className = 'attendus-domaine-body';
    attendus.forEach(function(a) {
      var lbl = document.createElement('label');
      lbl.className = 'check-item';
      lbl.style = 'gap:6px;align-items:flex-start';
      var sd = a.sous_domaine ? '<strong>' + a.sous_domaine + '</strong> — ' : '';
      var typeColor = (a.type === 'disciplinaire') ? '#7B6EE0' : '#4a7c59';
      var dot = '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + typeColor + ';flex-shrink:0;margin:3px 3px 0 0"></span>';
      var checked = S.attendu_ids.includes(String(a.id)) || S.attendu_ids.includes(a.id) ? 'checked' : '';
      lbl.innerHTML = '<input type="checkbox" name="attendu" value="' + a.id + '" ' + checked + '> ' + dot + ' <span>' + sd + a.libelle + '</span>';
      body.appendChild(lbl);
      ATTENDU_MODES[a.id] = ATTENDU_MODES[a.id] || 'incl';
    });
    container.appendChild(body);
    header.addEventListener('click', function() {
      var open = body.classList.toggle('open');
      chev.style.transform = open ? 'rotate(90deg)' : '';
    });
  });
}

async function chargerAttendus(cycleIds) {
  var secEdd  = document.getElementById('section-attendus-edd');
  var secDisc = document.getElementById('section-attendus-disc');
  var cEdd    = document.getElementById('f-attendus-edd');
  var cDisc   = document.getElementById('f-attendus-disc');
  if (!cycleIds || !cycleIds.length) {
    secEdd.style.display='none';  cEdd.innerHTML='';
    secDisc.style.display='none'; cDisc.innerHTML='';
    return;
  }
  try {
    var allAttendus = [];
    for (var i=0; i<cycleIds.length; i++) {
      var attendus = await api('/api/cycles/' + cycleIds[i] + '/attendus');
      attendus.forEach(function(a) { allAttendus.push(a); });
    }
    var multi = cycleIds.length > 1;
    var edd  = allAttendus.filter(function(a){ return !a.type || a.type === 'EDD'; });
    var disc = allAttendus.filter(function(a){ return a.type === 'disciplinaire'; });
    if (edd.length)  { buildAttendusAccordion(edd,  cEdd,  multi); secEdd.style.display='block'; }
    else             { cEdd.innerHTML='';  secEdd.style.display='none'; }
    if (disc.length) { buildAttendusAccordion(disc, cDisc, multi); secDisc.style.display='block'; }
    else             { cDisc.innerHTML=''; secDisc.style.display='none'; }
  } catch(e){}
}

// ============================================================================
// EVENTS
// ============================================================================
function bindEvents() {
  document.getElementById('btn-search').addEventListener('click', () => {
    S.q = document.getElementById('search-input').value.trim();
    S.search_mode = document.getElementById('search-mode').value;
    S.offset=0; search();
  });
  document.getElementById('search-input').addEventListener('keydown', e => {
    if(e.key==='Enter') document.getElementById('btn-search').click();
  });
  document.getElementById('search-mode').addEventListener('change', e => {
    S.search_mode = e.target.value;
    if(S.q) { S.offset=0; search(); }
  });
  document.getElementById('sort-select').addEventListener('change', e => {
    S.sort = e.target.value; S.offset=0; search();
  });
  document.getElementById('f-lieu').addEventListener('change', e => { S.lieu=e.target.value; S.offset=0; search(); });
  document.getElementById('f-groupe').addEventListener('change', e => { S.groupe=e.target.value; S.offset=0; search(); });
  document.querySelectorAll('input[name="anime"]').forEach(r => {
    r.addEventListener('change', e => { S.anime=e.target.value; S.offset=0; search(); });
  });

  // Météo — clic sur checkbox : cocher/décocher
  // Clic sur l'icône/libellé : bascule mode incl/excl si déjà coché
  document.querySelectorAll('input[name="meteo"]').forEach(cb => {
    cb.addEventListener('change', () => {
      S.meteo=[...document.querySelectorAll('input[name="meteo"]:checked')].map(x=>x.value);
      S.offset=0; search();
    });
    // Double-clic sur le label pour basculer le mode
    cb.parentElement.addEventListener('dblclick', (e) => {
      if (!cb.checked) return;
      const val = cb.value;
      METEO_MODES[val] = METEO_MODES[val] === 'excl' ? 'incl' : 'excl';
      S.offset=0; search();
    });
  });

  document.querySelectorAll('.month-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const m = btn.dataset.m;
      if (S.mois === m) {
        // Déjà actif : bascule mode ou désactive
        if (S.moisMode === 'incl') { S.moisMode = 'excl'; }
        else { S.mois = null; S.moisMode = 'incl'; }
      } else {
        S.mois = m; S.moisMode = 'incl';
      }
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active-incl','active-excl'));
      if (S.mois) btn.classList.add(S.moisMode === 'excl' ? 'active-excl' : 'active-incl');
      S.offset=0; search();
    });
  });

  document.getElementById('f-cycles').addEventListener('change', async e => {
    if(e.target.name==='cycle'){
      const checked = [...document.querySelectorAll('input[name="cycle"]:checked')];
      S.cycle_ids = checked.map(x=>x.value);
      S.attendu_ids=[]; S.offset=0;
      await chargerAttendus(S.cycle_ids);
      search();
    }
  });

  // Double-clic sur cycle pour basculer mode
  document.getElementById('f-cycles').addEventListener('dblclick', e => {
    const cb = e.target.closest('label')?.querySelector('input[name="cycle"]');
    if (!cb || !cb.checked) return;
    const id = cb.value;
    CYCLE_MODES[id] = CYCLE_MODES[id] === 'excl' ? 'incl' : 'excl';
    S.offset=0; search();
  });

  ['f-attendus-edd','f-attendus-disc'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.addEventListener('change', function(e){
      if(e.target.name==='attendu'){
        S.attendu_ids=[...document.querySelectorAll('input[name="attendu"]:checked')].map(function(x){return x.value;});
        S.offset=0; search();
      }
    });
    if (el) el.addEventListener('dblclick', function(e){
      const cb = e.target.closest('label')?.querySelector('input[name="attendu"]');
      if (!cb || !cb.checked) return;
      const id2 = cb.value;
      ATTENDU_MODES[id2] = ATTENDU_MODES[id2] === 'excl' ? 'incl' : 'excl';
      S.offset=0; search();
    });
  });

  document.getElementById('f-tags').addEventListener('change', () => {
    S.tag_ids = [...document.querySelectorAll('input[name="tag"]:checked')].map(x=>x.value);
    S.offset=0; search();
  });
  document.getElementById('f-tags').addEventListener('dblclick', e => {
    const cb = e.target.closest('label')?.querySelector('input[name="tag"]');
    if (!cb || !cb.checked) return;
    const id = cb.value;
    TAG_MODES[id] = TAG_MODES[id] === 'excl' ? 'incl' : 'excl';
    S.offset=0; search();
  });

  document.getElementById('btn-reset').addEventListener('click', resetAll);
  document.getElementById('btn-reset-toolbar').addEventListener('click', resetAll);
  document.getElementById('overlay').addEventListener('click', closeDrawer);
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
}

function resetAll() {
  S.q=''; S.lieu=''; S.meteo=[]; S.mois=null; S.moisMode='incl'; S.groupe='';
  S.thematique_id=null; S.thematique_mode='incl'; S.thematique_nom=null;
  S.objectif_id=null; S.objectif_mode='incl'; S.objectif_nom=null;
  S.cycle_ids=[]; S.attendu_ids=[]; S.tag_ids=[]; S.sort='nom'; S.offset=0;
  S.search_mode='titre'; S.anime='';
  Object.keys(METEO_MODES).forEach(k => { METEO_MODES[k]='incl'; });
  Object.keys(ATTENDU_MODES).forEach(k => { ATTENDU_MODES[k]='incl'; });
  Object.keys(TAG_MODES).forEach(k => { TAG_MODES[k]='incl'; });
  Object.keys(CYCLE_MODES).forEach(k => { CYCLE_MODES[k]='incl'; });
  document.getElementById('search-input').value='';
  document.getElementById('search-mode').value='titre';
  document.getElementById('sort-select').value='nom';
  document.getElementById('f-lieu').value='';
  document.getElementById('f-groupe').value='';
  document.querySelectorAll('input[name="meteo"]').forEach(cb=>cb.checked=false);
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active-incl','active-excl'));
  document.querySelectorAll('input[name="cycle"]').forEach(r=>r.checked=false);
  document.querySelectorAll('input[name="attendu"]').forEach(r=>r.checked=false);
  document.getElementById('section-attendus-edd').style.display='none';
  document.getElementById('section-attendus-disc').style.display='none';
  document.getElementById('f-attendus-edd').innerHTML='';
  document.getElementById('f-attendus-disc').innerHTML='';
  document.querySelectorAll('input[name="anime"]').forEach(r=>{ r.checked = r.value===''; });
  document.querySelectorAll('input[name="tag"]').forEach(cb=>cb.checked=false);
  const btnThem = document.getElementById('btn-pick-them');
  const btnObj  = document.getElementById('btn-pick-obj');
  btnThem.className='filter-pick-btn'; btnObj.className='filter-pick-btn';
  document.getElementById('pick-them-label').textContent='Toutes';
  document.getElementById('pick-obj-label').textContent='Tous';
  search();
}

// ============================================================================
// CHIPS — barre de filtres actifs
// ============================================================================
function buildChipsBar() {
  const bar = document.getElementById('chips-bar');
  bar.innerHTML = '';

  const addChip = (label, mode, onToggle, onRemove) => {
    const chip = document.createElement('span');
    chip.className = 'chip ' + mode;
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'chip-toggle';
    toggleBtn.title = mode === 'incl' ? 'Cliquer pour exclure' : 'Cliquer pour inclure';
    toggleBtn.textContent = mode === 'incl' ? '+' : '−';
    toggleBtn.addEventListener('click', onToggle);
    const txt = document.createTextNode(' ' + label + ' ');
    const rmBtn = document.createElement('button');
    rmBtn.className = 'chip-remove';
    rmBtn.title = 'Supprimer ce filtre';
    rmBtn.textContent = '✕';
    rmBtn.addEventListener('click', onRemove);
    chip.append(toggleBtn, txt, rmBtn);
    bar.appendChild(chip);
  };

  // Météo
  S.meteo.forEach(m => {
    const mode = METEO_MODES[m] || 'incl';
    addChip(METEO_ICO[m] + ' ' + METEO_LAB[m], mode,
      () => { METEO_MODES[m] = mode === 'incl' ? 'excl' : 'incl'; S.offset=0; search(); },
      () => {
        const cb = document.querySelector(`input[name="meteo"][value="${m}"]`);
        if (cb) { cb.checked=false; }
        S.meteo = S.meteo.filter(x=>x!==m); S.offset=0; search();
      }
    );
  });

  // Mois
  if (S.mois) {
    const idx = MOIS_NOMS.indexOf(S.mois);
    const lab = idx >= 0 ? MOIS_LAB[idx] : S.mois;
    addChip('📅 ' + lab, S.moisMode,
      () => { S.moisMode = S.moisMode === 'incl' ? 'excl' : 'incl'; S.offset=0; search(); },
      () => {
        S.mois=null; S.moisMode='incl';
        document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active-incl','active-excl'));
        S.offset=0; search();
      }
    );
  }

  // Thématique
  if (S.thematique_id) {
    addChip('🌿 ' + (S.thematique_nom||'Thématique'), S.thematique_mode,
      () => { S.thematique_mode = S.thematique_mode==='incl'?'excl':'incl'; S.offset=0; search(); },
      () => {
        S.thematique_id=null; S.thematique_nom=null; S.thematique_mode='incl';
        const b=document.getElementById('btn-pick-them');
        b.className='filter-pick-btn';
        document.getElementById('pick-them-label').textContent='Toutes';
        S.offset=0; search();
      }
    );
  }

  // Objectif
  if (S.objectif_id) {
    addChip('🎯 ' + (S.objectif_nom||'Objectif'), S.objectif_mode,
      () => { S.objectif_mode = S.objectif_mode==='incl'?'excl':'incl'; S.offset=0; search(); },
      () => {
        S.objectif_id=null; S.objectif_nom=null; S.objectif_mode='incl';
        const b=document.getElementById('btn-pick-obj');
        b.className='filter-pick-btn';
        document.getElementById('pick-obj-label').textContent='Tous';
        S.offset=0; search();
      }
    );
  }

  // Cycles
  S.cycle_ids.forEach(cid => {
    const mode = CYCLE_MODES[cid] || 'incl';
    const cb = document.querySelector(`input[name="cycle"][value="${cid}"]`);
    const lab = cb ? cb.closest('label').textContent.trim() : 'Cycle';
    addChip(lab.substring(0,20), mode,
      () => { CYCLE_MODES[cid] = mode==='incl'?'excl':'incl'; S.offset=0; search(); },
      () => {
        if (cb) cb.checked=false;
        S.cycle_ids = S.cycle_ids.filter(x=>x!==cid);
        chargerAttendus(S.cycle_ids); S.offset=0; search();
      }
    );
  });

  // Attendus
  S.attendu_ids.forEach(aid => {
    const mode = ATTENDU_MODES[aid] || 'incl';
    const cb = document.querySelector(`input[name="attendu"][value="${aid}"]`);
    const lab = cb ? cb.closest('label').textContent.trim().substring(0,30) : 'Attendu '+aid;
    addChip(lab + '…', mode,
      () => { ATTENDU_MODES[aid] = mode==='incl'?'excl':'incl'; S.offset=0; search(); },
      () => {
        if (cb) cb.checked=false;
        S.attendu_ids = S.attendu_ids.filter(x=>x!==aid && x!==parseInt(aid));
        S.offset=0; search();
      }
    );
  });

  // Tags
  S.tag_ids.forEach(tid => {
    const mode = TAG_MODES[tid] || 'incl';
    const cb = document.querySelector(`input[name="tag"][value="${tid}"]`);
    const lab = cb ? cb.closest('label').textContent.trim() : 'Tag';
    addChip('🏷 ' + lab, mode,
      () => { TAG_MODES[tid] = mode==='incl'?'excl':'incl'; S.offset=0; search(); },
      () => {
        if (cb) cb.checked=false;
        S.tag_ids = S.tag_ids.filter(x=>x!==tid && x!==parseInt(tid));
        S.offset=0; search();
      }
    );
  });
}

// ============================================================================
// SEARCH
// ============================================================================
async function search() {
  buildChipsBar();
  const p = new URLSearchParams();
  if(S.q) { p.set('q',S.q); p.set('search_mode', S.search_mode); }
  if(S.lieu) p.set('lieu',S.lieu);
  if(S.mois) {
    if (S.moisMode === 'excl') p.set('exclude_mois', S.mois);
    else p.set('mois', S.mois);
  }
  if(S.groupe) p.set('competence',S.groupe);
  if(S.anime !== '') p.set('anime',S.anime);

  // Thématique
  if(S.thematique_id) {
    if (S.thematique_mode === 'excl') p.set('exclude_thematique_id', S.thematique_id);
    else p.set('thematique_id', S.thematique_id);
  }
  // Objectif
  if(S.objectif_id) {
    if (S.objectif_mode === 'excl') p.set('exclude_objectif_id', S.objectif_id);
    else p.set('objectif_id', S.objectif_id);
  }

  // Météo — sépare incl / excl
  const meteoIncl = S.meteo.filter(m => (METEO_MODES[m]||'incl')==='incl');
  const meteoExcl = S.meteo.filter(m => (METEO_MODES[m]||'incl')==='excl');
  if(meteoIncl.length) p.set('meteo', meteoIncl[0]); // l'API prend 1 valeur à la fois
  if(meteoExcl.length) p.set('exclude_meteo', meteoExcl[0]);

  // Attendus — sépare incl / excl
  const attenduIncl = S.attendu_ids.filter(id => (ATTENDU_MODES[id]||'incl')==='incl');
  const attenduExcl = S.attendu_ids.filter(id => (ATTENDU_MODES[id]||'incl')==='excl');
  if(attenduIncl.length) p.set('attendu_ids', attenduIncl.join(','));
  if(attenduExcl.length) p.set('exclude_attendu_ids', attenduExcl.join(','));

  // Tags — sépare incl / excl
  const tagIncl = S.tag_ids.filter(id => (TAG_MODES[id]||'incl')==='incl');
  const tagExcl = S.tag_ids.filter(id => (TAG_MODES[id]||'incl')==='excl');
  if(tagIncl.length) p.set('tag_ids', tagIncl.join(','));
  if(tagExcl.length) p.set('exclude_tag_ids', tagExcl.join(','));

  // Cycles — sépare incl / excl (seulement si pas d'attendu incl)
  const cycleIncl = S.cycle_ids.filter(id => (CYCLE_MODES[id]||'incl')==='incl');
  const cycleExcl = S.cycle_ids.filter(id => (CYCLE_MODES[id]||'incl')==='excl');
  if(!attenduIncl.length && cycleIncl.length) p.set('cycle_ids', cycleIncl.join(','));
  if(cycleExcl.length) p.set('exclude_cycle_ids', cycleExcl.join(','));

  p.set('sort', S.sort);
  p.set('limit',S.limit); p.set('offset',S.offset);

  document.getElementById('results').innerHTML='<div class="loading">Recherche…</div>';
  try {
    const data = await api(`/api/activites?${p}`);
    S.total=data.total; renderResults(data);
  } catch(e){
    document.getElementById('results').innerHTML=`<div class="empty">Erreur : ${e.message}</div>`;
  }
}

// ============================================================================
// RENDER
// ============================================================================
function renderResults(data) {
  // Compteur résultats
  document.getElementById('result-count').textContent=`${data.total} résultat${data.total>1?'s':''}`;

  // Compteurs cycles
  if (data.cycle_counts) {
    const parts = Object.entries(data.cycle_counts)
      .filter(([,v]) => v > 0)
      .map(([k,v]) => `${k}: ${v}`);
    document.getElementById('cycle-counts').textContent = parts.length ? parts.join(' · ') : '';
  }

  const cnt=document.getElementById('results');
  if(!data.results.length){ cnt.innerHTML='<div class="empty">Aucune activité trouvée.</div>'; renderPagination(0); return; }
  cnt.innerHTML='';
  data.results.forEach(a => {
    const card=document.createElement('div'); card.className='card';
    const meteos=['nuage','soleil','pluie','vent','nuit'].filter(m=>a[`meteo_${m}`]).map(m=>METEO_ICO[m]).join(' ');
    const mActifs=MOIS_NOMS.filter(m=>a[`mois_${m}`]);
    const mStr=mActifs.length===12?"Toute l'année":mActifs.map(m=>MOIS_COURT[MOIS_NOMS.indexOf(m)]).join(' ');
    card.innerHTML=`
      <div class="card-title">${a.nom}</div>
      <div class="card-meta">
        ${a.lieu?`<span>📍 ${a.lieu}</span>`:''}
        ${meteos?`<span>${meteos}</span>`:''}
        ${mStr?`<span>📅 ${mStr}</span>`:''}
        ${a.duree_min?`<span>⏱ ${a.duree_min} min</span>`:''}
        ${a.format_groupe?`<span>👥 ${a.format_groupe}</span>`:''}
      </div>
      ${a.description?`<div class="card-desc">${a.description.substring(0,160)}${a.description.length>160?'…':''}</div>`:''}`;
    card.addEventListener('click',()=>openDrawer(a.id));
    cnt.appendChild(card);
  });
  renderPagination(data.total);
}

function renderPagination(total) {
  const el=document.getElementById('pagination');
  const pages=Math.ceil(total/S.limit); const cur=Math.floor(S.offset/S.limit)+1;
  if(pages<=1){el.innerHTML='';return;}
  let h='';
  if(S.offset>0) h+=`<button class="btn btn-ghost" onclick="goPage(${cur-2})">← Préc.</button>`;
  h+=`<span class="page-info">Page ${cur} / ${pages}</span>`;
  if(S.offset+S.limit<total) h+=`<button class="btn btn-ghost" onclick="goPage(${cur})">Suiv. →</button>`;
  el.innerHTML=h;
}
function goPage(i){S.offset=i*S.limit;search();document.querySelector('.results').scrollTop=0;}

async function openDrawer(id) {
  const c=document.getElementById('drawer-content');
  c.innerHTML='<div class="loading">Chargement…</div>';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  try {
    const a=await api(`/api/activites/${id}`);
    c.innerHTML=buildDrawer(a);
    const btn=c.querySelector('.open-folder-btn');
    if(btn) btn.addEventListener('click',()=>fetch(`/api/activites/${id}/ouvrir-dossier`).catch(()=>{}));
    await initDrawerTagSelect(id, a.tags);
  } catch(e){ c.innerHTML=`<div class="empty">Erreur : ${e.message}</div>`; }
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function buildDrawer(a) {
  const meteos=['nuage','soleil','pluie','vent','nuit'].filter(m=>a[`meteo_${m}`]).map(m=>`<span class="badge">${METEO_ICO[m]}</span>`).join('');
  const mActifs=MOIS_NOMS.filter(m=>a[`mois_${m}`]);
  const mStr=mActifs.length===12?"Toute l'année":mActifs.map(m=>MOIS_LAB[MOIS_NOMS.indexOf(m)]).join(', ');
  const badges=(arr,k='nom')=>arr&&arr.length?arr.map(x=>`<span class="badge">${x[k]}</span>`).join(''):'<span style="color:var(--text-muted);font-size:.82rem">—</span>';

  let h=`<h2>${a.nom}</h2>
  <div style="margin-bottom:8px">
    <button class="btn-edit" onclick="toggleEdit(${a.id})">✏️ Modifier</button>
  </div>`;

  h+=`<div class="drawer-section"><div class="info-grid">
    <div class="info-item"><div class="key">Lieu</div><div class="val">${a.lieu||'—'}</div></div>
    <div class="info-item"><div class="key">Durée</div><div class="val">${a.duree_min?a.duree_min+' min':'—'}</div></div>
    <div class="info-item"><div class="key">Format</div><div class="val">${a.format_groupe||'—'}</div></div>
    <div class="info-item"><div class="key">Animé</div><div class="val">${a.anime?'✓ Oui':'Non'}</div></div>
  </div></div>`;

  if(meteos) h+=`<div class="drawer-section"><h3>Météo</h3><div class="badges-wrap">${meteos}</div></div>`;
  if(mStr)   h+=`<div class="drawer-section"><h3>Mois</h3><p style="font-size:.84rem">${mStr}</p></div>`;
  if(a.description)   h+=`<div class="drawer-section"><h3>Description</h3><p style="font-size:.87rem;line-height:1.6">${a.description}</p></div>`;
  if(a.objectif_texte) h+=`<div class="drawer-section"><h3>Visée pédagogique</h3><p style="font-size:.87rem;line-height:1.6">${a.objectif_texte}</p></div>`;
  if(a.materiel_produit) h+=`<div class="drawer-section"><h3>Matériel produit</h3><p style="font-size:.87rem">${a.materiel_produit}</p></div>`;

  h+=`<div class="drawer-section"><h3>Thématiques</h3><div class="badges-wrap">${badges(a.thematiques)}</div></div>`;
  h+=`<div class="drawer-section"><h3>Objectifs</h3><div class="badges-wrap">${badges(a.objectifs)}</div></div>`;

  function fmtAttendus(items){
    if(!items||!items.length) return '<span style="color:var(--text-muted);font-size:.82rem">—</span>';
    var byCycle={};
    items.forEach(function(at){
      if(!byCycle[at.cycle_code]) byCycle[at.cycle_code]={};
      var dom=at.domaine||'Autre';
      if(!byCycle[at.cycle_code][dom]) byCycle[at.cycle_code][dom]=[];
      byCycle[at.cycle_code][dom].push(at);
    });
    var s='';
    Object.keys(byCycle).sort().forEach(function(code){
      s+='<div class="attendu-cycle-title">'+code+'</div>';
      var byDom=byCycle[code];
      Object.keys(byDom).sort().forEach(function(dom){
        byDom[dom].forEach(function(at){
          var sd=at.sous_domaine?'<strong>'+at.sous_domaine+'</strong> — ':'';
          var isEDD=!at.type||at.type==='EDD';
          var dotColor=isEDD?'#4a7c59':'#7B6EE0';
          var badgeBg=isEDD?'':'#EEEDFE';
          var badgeColor=isEDD?'':'#534AB7';
          var style=badgeBg?'style="background:'+badgeBg+';color:'+badgeColor+'"':'';
          var dot='<span title="'+(isEDD?'EDD':'Disciplinaire')+'" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+dotColor+';flex-shrink:0;margin:3px 4px 0 0"></span>';
          s+='<div class="attendu-row">'+dot+'<span class="badge attendu-dom" '+style+'>'+dom+'</span><span>'+sd+at.libelle+'</span></div>';
        });
      });
    });
    return s;
  }
  h+=`<div class="drawer-section"><h3>Attendus <span style="font-size:.68rem;margin-left:6px;opacity:.7">` +
    `<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#4a7c59;display:inline-block"></span>EDD</span>` +
    `&nbsp;&nbsp;<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#7B6EE0;display:inline-block"></span>Disciplinaire</span>` +
    `</span></h3>`+fmtAttendus(a.attendus)+'</div>';

  h+=`<div class="drawer-section"><h3>Tags</h3>
    <div id="drawer-tags-wrap" class="badges-wrap" style="margin-bottom:6px">${
      a.tags&&a.tags.length
        ? a.tags.map(t=>`<span class="badge" style="background:#f0e8f5;color:#5c2d7a">${t.nom}</span>`).join('')
        : '<span style="color:var(--text-muted);font-size:.82rem">Aucun tag</span>'
    }</div>
    <select id="drawer-tag-select" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;background:var(--surface);color:var(--text)">
      <option value="">+ Ajouter un tag…</option>
    </select>
  </div>`;

  if(a.relations&&a.relations.length){
    h+=`<div class="drawer-section"><h3>Activités liées</h3>`;
    a.relations.forEach(r=>{
      h+=`<div style="font-size:.84rem;padding:3px 0;display:flex;gap:7px;align-items:center">
        <span class="badge">${r.type_relation}</span>
        <span style="cursor:pointer;color:var(--accent);text-decoration:underline" onclick="openDrawer(${r.id})">${r.nom}</span></div>`;
    });
    h+=`</div>`;
  }

  if(a.chemin_dossier){
    h+=`<div class="drawer-section"><h3>Fichiers</h3>
      <button class="open-folder-btn">📂 Ouvrir le dossier</button>
      <div style="font-size:.72rem;color:var(--text-muted);margin-top:4px;word-break:break-all">${a.chemin_dossier}</div>
    </div>`;
  }
  return h;
}

async function saveEdit(id) {
  const getChecked = (name) => [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(x => parseInt(x.value) || x.value);
  const getMoisChecked = () => {
    const MOIS = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
    const checked = [...document.querySelectorAll('input[name="edit-mois"]:checked')].map(x=>x.value);
    const obj = {};
    MOIS.forEach(m => obj['mois_'+m] = checked.includes(m) ? 1 : 0);
    return obj;
  };

  const payload = {
    nom: document.getElementById('edit-nom').textContent.trim(),
    description: document.getElementById('edit-description').value,
    objectif_texte: document.getElementById('edit-objectif').value,
    lieu: document.getElementById('edit-lieu').value,
    duree_min: parseInt(document.getElementById('edit-duree').value) || null,
    format_groupe: document.getElementById('edit-format').value || null,
    anime: document.getElementById('edit-anime').checked ? 1 : 0,
    meteo_soleil: document.getElementById('edit-soleil').checked ? 1 : 0,
    meteo_pluie:  document.getElementById('edit-pluie').checked ? 1 : 0,
    meteo_vent:   document.getElementById('edit-vent').checked ? 1 : 0,
    meteo_nuage:  document.getElementById('edit-nuage').checked ? 1 : 0,
    meteo_nuit:   document.getElementById('edit-nuit').checked ? 1 : 0,
    thematique_ids: getChecked('edit-them'),
    objectif_ids: getChecked('edit-obj'),
    attendu_ids: getChecked('edit-attendu'),
    tag_ids: editTagIds,
    ...getMoisChecked()
  };

  const status = document.getElementById('save-status');
  try {
    const r = await fetch(`/api/activites/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error(await r.text());
    status.className = 'save-success';
    status.textContent = 'Enregistré !';
    setTimeout(() => openDrawer(id), 800);
    search();
  } catch(e) {
    status.className = 'save-error';
    status.textContent = 'Erreur : ' + e.message;
  }
}

const treeCache = { them: [], obj: [] };
let modalMode = 'them';
let modalSelectedId = null;
let modalSelectedNom = null;
let modalExclMode = false;

function openTreeModal(mode) {
  modalMode = mode;
  modalSelectedId   = mode === 'them' ? S.thematique_id   : S.objectif_id;
  modalSelectedNom  = mode === 'them' ? S.thematique_nom  : S.objectif_nom;
  modalExclMode     = mode === 'them' ? S.thematique_mode==='excl' : S.objectif_mode==='excl';
  document.getElementById('modal-title').textContent = mode === 'them' ? 'Choisir une thématique' : 'Choisir un objectif';
  document.getElementById('modal-search').value = '';
  document.getElementById('modal-excl-check').checked = modalExclMode;
  document.getElementById('modal-excl-check').onchange = (e) => { modalExclMode = e.target.checked; };
  renderModalTree(treeCache[mode]);
  document.getElementById('tree-modal').classList.add('open');
}

function closeTreeModal() {
  document.getElementById('tree-modal').classList.remove('open');
}

function renderModalTree(nodes, container) {
  const c = container || document.getElementById('modal-tree');
  c.innerHTML = '';
  nodes.forEach(n => c.appendChild(makeMNode(n)));
}

function makeMNode(node) {
  const div = document.createElement('div');
  div.className = 'mnode';
  div.dataset.id = node.id;
  div.dataset.nom = node.nom;

  const row = document.createElement('div');
  const isSelected = node.id === modalSelectedId;
  const selClass = isSelected ? (modalExclMode ? 'selected-excl' : 'selected-incl') : '';
  row.className = 'mrow' + (selClass ? ' ' + selClass : '');

  const chev = document.createElement('span');
  chev.className = 'mchev';
  chev.textContent = (node.children && node.children.length) ? '▶' : '';

  const lbl = document.createElement('span');
  lbl.className = 'mlabel';
  lbl.textContent = node.nom;

  row.append(chev, lbl);
  div.appendChild(row);

  if (node.children && node.children.length) {
    const kids = document.createElement('div');
    kids.className = 'mchildren';
    node.children.forEach(ch => kids.appendChild(makeMNode(ch)));
    div.appendChild(kids);
    chev.addEventListener('click', e => { e.stopPropagation(); div.classList.toggle('open'); });
  }

  row.addEventListener('click', e => {
    e.stopPropagation();
    if (node.id === modalSelectedId) {
      modalSelectedId = null;
      modalSelectedNom = null;
    } else {
      modalSelectedId = node.id;
      modalSelectedNom = node.nom;
    }
    document.querySelectorAll('#modal-tree .mrow').forEach(r => r.classList.remove('selected-incl','selected-excl'));
    if (modalSelectedId) {
      const cls = modalExclMode ? 'selected-excl' : 'selected-incl';
      row.classList.add(cls);
    }
    applyModalSelection();
  });

  return div;
}

function applyModalSelection() {
  const stateKey    = modalMode === 'them' ? 'thematique_id'   : 'objectif_id';
  const modeKey     = modalMode === 'them' ? 'thematique_mode' : 'objectif_mode';
  const nomKey      = modalMode === 'them' ? 'thematique_nom'  : 'objectif_nom';
  const btnId       = modalMode === 'them' ? 'btn-pick-them'   : 'btn-pick-obj';
  const lblId       = modalMode === 'them' ? 'pick-them-label' : 'pick-obj-label';
  const defLabel    = modalMode === 'them' ? 'Toutes' : 'Tous';

  S[stateKey] = modalSelectedId;
  S[modeKey]  = modalExclMode ? 'excl' : 'incl';
  S[nomKey]   = modalSelectedNom;
  S.offset = 0;

  const btn = document.getElementById(btnId);
  const lbl = document.getElementById(lblId);
  if (modalSelectedId) {
    btn.className = 'filter-pick-btn active-' + S[modeKey];
    lbl.textContent = (modalExclMode ? '− ' : '+ ') + (modalSelectedNom || defLabel);
  } else {
    btn.className = 'filter-pick-btn';
    lbl.textContent = defLabel;
  }
  search();
}

function clearModalSelection() {
  modalSelectedId = null; modalSelectedNom = null;
  document.querySelectorAll('#modal-tree .mrow').forEach(r => r.classList.remove('selected-incl','selected-excl'));
  applyModalSelection();
}

function expandAllModal() {
  document.querySelectorAll('#modal-tree .mnode').forEach(n => {
    if (n.querySelector('.mchildren')) n.classList.add('open');
  });
}
function collapseAllModal() {
  document.querySelectorAll('#modal-tree .mnode').forEach(n => n.classList.remove('open'));
}

function filterModal(q) {
  const nodes = document.querySelectorAll('#modal-tree .mnode');
  if (!q) { nodes.forEach(n => { n.style.display=''; }); return; }
  q = q.toLowerCase();
  nodes.forEach(n => { n.style.display = 'none'; });
  nodes.forEach(n => {
    if (n.dataset.nom && n.dataset.nom.toLowerCase().includes(q)) {
      n.style.display = '';
      let p = n.parentElement;
      while (p && p.id !== 'modal-tree') {
        if (p.classList.contains('mnode')) { p.style.display=''; p.classList.add('open'); }
        p = p.parentElement;
      }
    }
  });
}

document.getElementById('tree-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('tree-modal')) closeTreeModal();
});

let editTagIds = [];
let allTagsCache = [];

async function loadAllTags() {
  try { allTagsCache = await api('/api/tags'); return allTagsCache; } catch(e) { return []; }
}

async function populateTagSelect(activiteTags) {
  editTagIds = (activiteTags||[]).map(t => t.id);
  const tags = await loadAllTags();
  const sel = document.getElementById('edit-tag-select');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Ajouter un tag —</option>';
  tags.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id; o.textContent = t.nom;
    sel.appendChild(o);
  });
  renderEditTags();
}

function renderEditTags() {
  const c = document.getElementById('edit-tags-container');
  if (!c) return;
  c.innerHTML = '';
  editTagIds.forEach(tid => {
    const t = allTagsCache.find(x => x.id === tid || x.id === parseInt(tid));
    if (!t) return;
    const span = document.createElement('span');
    span.style = 'background:#f0e8f5;color:#5c2d7a;padding:3px 10px;border-radius:20px;font-size:.78rem;display:flex;align-items:center;gap:5px';
    span.innerHTML = `${t.nom} <button onclick="removeTagFromEdit(${t.id})" style="background:none;border:none;cursor:pointer;color:#5c2d7a;font-size:.9rem;padding:0">×</button>`;
    c.appendChild(span);
  });
}

function addTagToEdit() {
  const sel = document.getElementById('edit-tag-select');
  const val = parseInt(sel.value);
  if (!val || editTagIds.includes(val)) return;
  editTagIds.push(val);
  sel.value = '';
  renderEditTags();
}

function removeTagFromEdit(id) {
  editTagIds = editTagIds.filter(x => x !== id);
  renderEditTags();
}

function showCreateTag() {
  const f = document.getElementById('new-tag-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function createAndAddTag(activiteId) {
  const input = document.getElementById('new-tag-input');
  const nom = input.value.trim();
  if (!nom) return;
  try {
    const r = await fetch('/api/tags', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({nom})
    });
    const tag = await r.json();
    allTagsCache.push(tag);
    editTagIds.push(tag.id);
    input.value = '';
    document.getElementById('new-tag-form').style.display = 'none';
    const sel = document.getElementById('edit-tag-select');
    const o = document.createElement('option');
    o.value = tag.id; o.textContent = tag.nom;
    sel.appendChild(o);
    renderEditTags();
  } catch(e) { alert('Erreur création tag'); }
}

const _toggleEditOrig = toggleEdit;
toggleEdit = async function(id) {
  await _toggleEditOrig(id);
  const a = await api(`/api/activites/${id}`);
  await populateTagSelect(a.tags);
};

async function initDrawerTagSelect(activiteId, activiteTags) {
  const sel = document.getElementById('drawer-tag-select');
  if (!sel) return;
  const tags = await loadAllTags();
  const assignedIds = new Set((activiteTags||[]).map(t => t.id));
  sel.innerHTML = '<option value="">+ Ajouter un tag…</option>';
  tags.filter(t => !assignedIds.has(t.id)).forEach(t => {
    const o = document.createElement('option');
    o.value = t.id; o.textContent = t.nom;
    sel.appendChild(o);
  });
  sel.onchange = async () => {
    const tagId = parseInt(sel.value);
    if (!tagId) return;
    const a = await api(`/api/activites/${activiteId}`);
    const tagIds = [...(a.tags||[]).map(t => t.id), tagId];
    await fetch(`/api/activites/${activiteId}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({tag_ids: tagIds})
    });
    openDrawer(activiteId);
    search();
  };
}

init();
</script>
